<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrilateral QR Code Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^1.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="container mx-auto p-5">
        <h1 class="text-2xl font-bold mb-5 text-center">Quadrilateral QR Code Scanner</h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 shadow rounded-lg flex flex-col items-center justify-center">
                <h2 class="text-xl">Top Scanner</h2>
                <button class="bg-blue-500 text-white py-2 px-4 rounded">Scan QR</button>
            </div>
            <div class="bg-white p-4 shadow rounded-lg flex flex-col items-center justify-center">
                <h2 class="text-xl">Left Scanner</h2>
                <button class="bg-blue-500 text-white py-2 px-4 rounded">Scan QR</button>
            </div>
            <div class="bg-white p-4 shadow rounded-lg flex flex-col items-center justify-center">
                <h2 class="text-xl">Right Scanner</h2>
                <button class="bg-blue-500 text-white py-2 px-4 rounded">Scan QR</button>
            </div>
            <div class="bg-white p-4 shadow rounded-lg flex flex-col items-center justify-center">
                <h2 class="text-xl">Bottom Scanner</h2>
                <button class="bg-blue-500 text-white py-2 px-4 rounded">Scan QR</button>
            </div>
        </div>
    </div>
    <script>
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                alert('Scanning QR Code...');
                // Add QR scanning functionality here
            });
        });
    </script>
</body>
</html>
