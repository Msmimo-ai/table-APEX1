<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEX 1</title>
<style>
  :root {
    --bg: #1a1c1e;
    --bg2: #22262b;
    --bg3: #2c3138;
    --border: #3a3f47;
    --accent: #e8a020;
    --accent2: #c87d10;
    --purple: #7c6fcd;
    --green: #3dba6e;
    --red: #e05252;
    --text: #d4d8de;
    --text2: #8a9099;
    --text3: #555d68;
    --strip: #383d45;
    --strip-hover: #4a5260;
    --strip-active: #7c6fcd;
    --strip-fresh: #3dba6e;
    --corner: #2e333a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Consolas', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { padding: 1.4rem 1.2rem; max-width: 700px; margin: 0 auto; }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.6rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .header-title { font-size: 11px; letter-spacing: 0.15em; color: var(--text2); text-transform: uppercase; }
  .header-badge { background: var(--accent); color: #111; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 2px; letter-spacing: 0.08em; }
  .header-line { flex: 1; height: 1px; background: var(--border); }

  /* Table section */
  .table-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 1.6rem; }
  .apex-tag { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); font-size: 10px; font-weight: 700; padding: 5px 10px; letter-spacing: 0.12em; white-space: nowrap; }
  .table-outer { flex: 1; }
  .dir-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--accent); text-align: center; padding: 3px 0; }
  .table-box { border: 1.5px solid var(--border); background: var(--bg2); padding: 10px 8px; display: flex; gap: 6px; justify-content: center; position: relative; }
  .table-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4; }

  /* Seat */
  .seat { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .seat-num { font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; }

  .seat-grid {
    width: 72px; height: 98px;
    position: relative;
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  .frame-center {
    position: absolute;
    top: 13px; bottom: 13px; left: 13px; right: 13px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--text3);
    pointer-events: none; z-index: 1;
    border: 1px solid var(--border);
    letter-spacing: 0.05em;
  }

  /* Long sides */
  .strip-left, .strip-right {
    position: absolute; top: 0; bottom: 0; width: 13px;
    cursor: pointer; z-index: 3;
    background: var(--strip);
    transition: background 0.1s;
    border: none;
  }
  .strip-left  { left: 0; border-right: 1px solid var(--border); }
  .strip-right { right: 0; border-left: 1px solid var(--border); }

  /* Short sides */
  .strip-top, .strip-bottom {
    position: absolute; left: 13px; right: 13px; height: 13px;
    cursor: pointer; z-index: 3;
    background: var(--strip);
    transition: background 0.1s;
  }
  .strip-top    { top: 0; border-bottom: 1px solid var(--border); }
  .strip-bottom { bottom: 0; border-top: 1px solid var(--border); }

  /* Corner fills */
  .corner { position: absolute; width: 13px; height: 13px; background: var(--corner); pointer-events: none; z-index: 2; }
  .corner-tl { top: 0; left: 0; } .corner-tr { top: 0; right: 0; }
  .corner-bl { bottom: 0; left: 0; } .corner-br { bottom: 0; right: 0; }

  .strip-left:hover, .strip-right:hover,
  .strip-top:hover, .strip-bottom:hover { background: var(--strip-hover); }

  .strip-left.active, .strip-right.active,
  .strip-top.active, .strip-bottom.active {
    background: var(--strip-active);
    box-shadow: 0 0 8px rgba(124,111,205,0.4);
  }
  .strip-left.fresh, .strip-right.fresh,
  .strip-top.fresh, .strip-bottom.fresh {
    background: var(--strip-fresh) !important;
    box-shadow: 0 0 10px rgba(61,186,110,0.5) !important;
    transition: background 0.1s;
  }

  /* Legend */
  .legend { display: flex; gap: 20px; margin-bottom: 1.2rem; padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .legend-swatch { width: 10px; height: 10px; }

  /* Panel */
  .panel { background: var(--bg2); border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1rem; }
  .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .panel-label { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); }
  .panel-tag { font-size: 10px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent2); padding: 2px 8px; letter-spacing: 0.05em; }
  .panel-empty { font-size: 12px; color: var(--text3); font-style: italic; }
  .status { font-size: 11px; color: var(--text2); margin-top: 8px; min-height: 16px; letter-spacing: 0.03em; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }

  /* Camera */
  .cam-area { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; border: 1px solid var(--border); }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 55%; aspect-ratio: 1; border: 1.5px solid var(--accent); position: relative; overflow: hidden; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 20px rgba(232,160,32,0.3); }
  .scan-line { position: absolute; left: 0; right: 0; height: 1.5px; background: var(--accent); animation: scanline 1.2s ease-in-out infinite; box-shadow: 0 0 6px var(--accent); }
  @keyframes scanline { 0%,100%{top:5%} 50%{top:90%} }
  .found-flash { position: absolute; inset: 0; background: rgba(61,186,110,0.3); opacity: 0; transition: opacity 0.1s; }
  .fps-badge { position: absolute; top: 6px; right: 8px; background: rgba(0,0,0,0.7); color: var(--accent); font-size: 10px; padding: 2px 6px; font-family: monospace; letter-spacing: 0.05em; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin-top: 0.8rem; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.1s; }
  button:hover { border-color: var(--text2); background: var(--bg3); }
  button.primary { border-color: var(--purple); color: var(--purple); }
  button.primary:hover { background: var(--purple); color: #fff; }
  button.danger { border-color: var(--red); color: var(--red); }
  button.danger:hover { background: var(--red); color: #fff; }

  /* Input */
  .input-row { display: flex; gap: 8px; margin-top: 0.8rem; }
  input[type=text] { flex: 1; font-family: inherit; font-size: 12px; padding: 8px 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); outline: none; letter-spacing: 0.03em; }
  input[type=text]:focus { border-color: var(--purple); }
  input[type=text]::placeholder { color: var(--text3); }

  /* Records */
  .record-list { display: flex; flex-direction: column; gap: 4px; margin-top: 0.6rem; max-height: 300px; overflow-y: auto; }
  .record-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg3); border-left: 2px solid var(--purple); }
  .record-seat { font-size: 10px; font-weight: 700; color: var(--purple); min-width: 72px; white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
  .record-val { font-size: 11px; color: var(--text); flex: 1; word-break: break-all; }
  .record-time { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .record-del { font-size: 10px; color: var(--red); cursor: pointer; background: none; border: none; padding: 2px 6px; font-family: inherit; text-transform: uppercase; letter-spacing: 0.05em; }
  .record-del:hover { background: var(--red); color: #fff; }

  .sync-badge { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .sync-badge.ok  { color: var(--green); }
  .sync-badge.err { color: var(--red); }
  .sync-badge.loading { color: var(--text3); }

  /* Scrollbar */
  .record-list::-webkit-scrollbar { width: 3px; }
  .record-list::-webkit-scrollbar-track { background: var(--bg2); }
  .record-list::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-badge">APEX 1</div>
    <div class="header-title">Système de scan QR</div>
    <div class="header-line"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--strip)"></div>Non scanné</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--strip-active)"></div>Sélectionné</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--strip-fresh)"></div>Enregistré</div>
  </div>

  <div class="table-wrap">
    <div class="apex-tag">APEX<br>1</div>
    <div class="table-outer">
      <div class="dir-label">— NORD —</div>
      <div class="table-box" id="table-box"></div>
      <div class="dir-label">— SUD —</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Position active</div>
      <span class="panel-tag" id="active-tag" style="display:none"></span>
    </div>
    <p class="panel-empty" id="hint-text">Sélectionnez un côté</p>
    <div id="scan-section" style="display:none">
      <div class="cam-area" id="cam-area" style="display:none">
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-overlay">
          <div style="position:relative;width:55%;aspect-ratio:1">
            <div class="scan-frame">
              <div class="scan-line"></div>
              <div class="found-flash" id="found-flash"></div>
            </div>
          </div>
        </div>
        <div class="fps-badge" id="fps-badge">— fps</div>
      </div>
      <div class="status" id="scan-status"></div>
      <div class="btn-row">
        <button class="primary" id="scan-btn" onclick="startScan()">▶ Scanner</button>
        <button onclick="toggleManual()">✎ Manuel</button>
        <button class="danger" onclick="clearActive()" style="margin-left:auto">✕ Effacer</button>
      </div>
      <div class="input-row" id="manual-row" style="display:none">
        <input type="text" id="manual-input" placeholder="Entrer le contenu..."/>
        <button class="primary" onclick="saveManual()">OK</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Historique</div>
      <span class="sync-badge loading" id="sync-status">Chargement…</span>
    </div>
    <div class="record-list" id="record-list">
      <p class="panel-empty">Aucun enregistrement</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://puydipjoykvwzpwnjedi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yZeJG14bj8esqS9D743ymA_1eYH64CG';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const COL_POSITION = 'position';
const COL_VALUE    = 'no.pièce';
const COL_SCANNED  = 'date';

const SEAT_ORDER = [5,4,3,2,1];
const FACES = ['top','right','bottom','left'];
const FACE_LABEL = { top:'NORD', right:'EST', bottom:'SUD', left:'OUEST' };

let activeKey = null;
let scanning = false, rafId = null, currentStream = null;
let fpsFrames = 0, fpsLast = performance.now();
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const dataStore = {};

function buildTable() {
  const box = document.getElementById('table-box');
  box.innerHTML = '';
  SEAT_ORDER.forEach(s => {
    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.innerHTML = `
      <div class="seat-num">#${s}</div>
      <div class="seat-grid" id="seat-grid-${s}">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>
        <div class="frame-center">${s}</div>
        <div class="strip-left"   id="strip-${s}-left"   onclick="selectFace(${s},'left')"></div>
        <div class="strip-right"  id="strip-${s}-right"  onclick="selectFace(${s},'right')"></div>
        <div class="strip-top"    id="strip-${s}-top"    onclick="selectFace(${s},'top')"></div>
        <div class="strip-bottom" id="strip-${s}-bottom" onclick="selectFace(${s},'bottom')"></div>
      </div>`;
    box.appendChild(seat);
  });
}

function selectFace(seat, face) {
  if (activeKey) {
    const [ps, pf] = parseKey(activeKey);
    document.getElementById(`strip-${ps}-${pf}`)?.classList.remove('active');
  }
  activeKey = `seat${seat}_${face}`;
  document.getElementById(`strip-${seat}-${face}`)?.classList.add('active');
  const label = `S${seat} · ${FACE_LABEL[face]}`;
  document.getElementById('active-tag').textContent = label;
  document.getElementById('active-tag').style.display = '';
  document.getElementById('hint-text').style.display = 'none';
  document.getElementById('scan-section').style.display = '';
  const cur = dataStore[activeKey];
  setStatus(cur ? '▪ ' + cur.value : 'Non enregistré', '');
  stopScan();
  document.getElementById('manual-row').style.display = 'none';
}

function parseKey(key) {
  const m = key.match(/^seat(\d+)_(\w+)$/);
  return [m[1], m[2]];
}

function flashGreen(seat, face) {
  const strip = document.getElementById(`strip-${seat}-${face}`);
  if (!strip) return;
  strip.classList.add('fresh');
  setTimeout(() => strip.classList.remove('fresh'), 3000);
}

function setStatus(text, type) {
  const el = document.getElementById('scan-status');
  el.textContent = text;
  el.className = 'status' + (type ? ' ' + type : '');
}

function setSyncStatus(text, type) {
  const el = document.getElementById('sync-status');
  el.textContent = text;
  el.className = 'sync-badge ' + (type || 'loading');
}

async function loadRecords() {
  setSyncStatus('Sync…', 'loading');
  const { data, error } = await sb.from('scans').select('*').order('id', { ascending: false }).limit(500);
  if (error) { setSyncStatus('Erreur', 'err'); return; }
  setSyncStatus('Synchronisé ✓', 'ok');
  Object.keys(dataStore).forEach(k => delete dataStore[k]);
  (data || []).forEach(r => {
    const key = r[COL_POSITION];
    if (key && !dataStore[key]) dataStore[key] = { value: r[COL_VALUE], id: r.id };
  });
  renderRecords(data || []);
}

async function startScan() {
  if (!activeKey || scanning) return;
  document.getElementById('cam-area').style.display = '';
  setStatus('Démarrage caméra…', '');
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = currentStream;
    await video.play();
    scanning = true;
    document.getElementById('scan-btn').textContent = '■ Stop';
    document.getElementById('scan-btn').onclick = stopScan;
    setStatus('Pointez le QR code…', '');
    fpsLast = performance.now(); fpsFrames = 0;
    tick(video);
  } catch(e) {
    setStatus('Erreur caméra : ' + e.message, 'err');
    document.getElementById('cam-area').style.display = 'none';
  }
}

function tick(video) {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const scale = Math.min(1, 640 / (video.videoWidth || 640));
    const w = Math.round((video.videoWidth || 640) * scale);
    const h = Math.round((video.videoHeight || 480) * scale);
    if (canvas.width !== w) canvas.width = w;
    if (canvas.height !== h) canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);
    const result = jsQR(ctx.getImageData(0, 0, w, h).data, w, h, { inversionAttempts: 'attemptBoth' });
    if (result?.data) {
      document.getElementById('found-flash').style.opacity = '1';
      setTimeout(() => { document.getElementById('found-flash').style.opacity = '0'; }, 250);
      stopScan();
      saveValue(result.data);
      return;
    }
    fpsFrames++;
    const now = performance.now();
    if (now - fpsLast >= 1000) {
      document.getElementById('fps-badge').textContent = fpsFrames + ' fps';
      fpsFrames = 0; fpsLast = now;
    }
  }
  rafId = requestAnimationFrame(() => tick(video));
}

function stopScan() {
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const video = document.getElementById('video');
  if (video) video.srcObject = null;
  document.getElementById('cam-area').style.display = 'none';
  document.getElementById('fps-badge').textContent = '— fps';
  document.getElementById('scan-btn').textContent = '▶ Scanner';
  document.getElementById('scan-btn').onclick = startScan;
}

function toggleManual() {
  const row = document.getElementById('manual-row');
  row.style.display = row.style.display === 'none' ? '' : 'none';
  if (row.style.display !== 'none') document.getElementById('manual-input').focus();
}

function saveManual() {
  const v = document.getElementById('manual-input').value.trim();
  if (!v || !activeKey) return;
  saveValue(v);
  document.getElementById('manual-input').value = '';
  document.getElementById('manual-row').style.display = 'none';
}

async function saveValue(val) {
  setStatus('Enregistrement…', '');
  const row = { [COL_POSITION]: activeKey, [COL_VALUE]: val, [COL_SCANNED]: new Date().toISOString() };
  const { data, error } = await sb.from('scans').insert(row).select().single();
  if (error) {
    setStatus('Erreur : ' + error.message, 'err');
  } else {
    dataStore[activeKey] = { value: val, id: data.id };
    setStatus('✓ Enregistré : ' + val, 'ok');
    const [seat, face] = parseKey(activeKey);
    flashGreen(seat, face);
    loadRecords();
  }
}

async function clearActive() {
  if (!activeKey) return;
  setStatus('Suppression…', '');
  await sb.from('scans').delete().eq(COL_POSITION, activeKey);
  delete dataStore[activeKey];
  setStatus('Effacé', '');
  loadRecords();
}

async function deleteRecord(id, key) {
  await sb.from('scans').delete().eq('id', id);
  if (dataStore[key]?.id === id) delete dataStore[key];
  loadRecords();
}

function renderRecords(records) {
  const list = document.getElementById('record-list');
  if (!records.length) { list.innerHTML = '<p class="panel-empty">Aucun enregistrement</p>'; return; }
  list.innerHTML = records.map(r => {
    const key = r[COL_POSITION] || '';
    const m = key.match(/^seat(\d+)_(\w+)$/);
    const label = m ? `S${m[1]}·${FACE_LABEL[m[2]]||m[2]}` : key;
    const val = r[COL_VALUE] || '';
    const rawTime = r[COL_SCANNED];
    const time = rawTime ? new Date(rawTime).toLocaleString('fr-CA', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="record-item">
      <span class="record-seat">${label}</span>
      <span class="record-val">${val}</span>
      <span class="record-time">${time}</span>
      <button class="record-del" onclick="deleteRecord('${r.id}','${key}')">✕</button>
    </div>`;
  }).join('');
}

window.selectFace = selectFace;
window.startScan = startScan;
window.stopScan = stopScan;
window.toggleManual = toggleManual;
window.saveManual = saveManual;
window.clearActive = clearActive;
window.deleteRecord = deleteRecord;

buildTable();
loadRecords();
</script>
</body>
</html>
