<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>四边形二维码记录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  .container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 16px; font-weight: 500; color: #1a1a1a; margin-bottom: 1.5rem; text-align: center; }
  .quad-wrap { display: flex; justify-content: center; align-items: center; margin: 1rem 0 1.5rem; }
  svg#quad { overflow: visible; }
  .side-btn { cursor: pointer; }
  .side-btn:hover .side-hit { opacity: 0.12; }
  .side-hit { opacity: 0; fill: #7F77DD; transition: opacity 0.15s; }
  .side-label { font-size: 12px; fill: #888; font-family: system-ui, sans-serif; }
  .side-value { font-size: 11px; fill: #534AB7; font-family: monospace; }
  .panel { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .panel-title { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.75rem; }
  .panel-empty { font-size: 13px; color: #aaa; }
  .cam-area { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 8px; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 60%; aspect-ratio: 1; border: 2px solid rgba(127,119,221,0.9); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); position: relative; }
  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: #7F77DD; animation: scan 1.6s ease-in-out infinite; }
  @keyframes scan { 0%,100%{top:5%} 50%{top:90%} }
  .btn-row { display: flex; gap: 8px; margin-top: 0.75rem; flex-wrap: wrap; }
  button { font-size: 13px; padding: 7px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #1a1a1a; cursor: pointer; }
  button:hover { background: #f0f0ee; }
  button.primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  button.primary:hover { background: #3C3489; }
  button.danger { border-color: rgba(200,50,50,0.4); color: #c03030; }
  .input-row { display: flex; gap: 8px; margin-top: 0.75rem; }
  input[type=text] { flex: 1; font-size: 13px; padding: 7px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #f5f5f3; color: #1a1a1a; outline: none; }
  input[type=text]:focus { border-color: #534AB7; }
  .tag { display: inline-block; background: #EEEDFE; color: #3C3489; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .status { font-size: 12px; color: #666; margin-top: 6px; }
  .record-list { display: flex; flex-direction: column; gap: 6px; margin-top: 0.5rem; }
  .record-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #f5f5f3; border-radius: 8px; }
  .record-side { font-size: 11px; font-weight: 500; color: #534AB7; min-width: 28px; }
  .record-val { font-size: 12px; color: #1a1a1a; flex: 1; word-break: break-all; font-family: monospace; }
  .record-del { font-size: 11px; color: #c03030; cursor: pointer; background: none; border: none; padding: 2px 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>四边形二维码记录</h1>

  <div class="quad-wrap">
    <svg id="quad" width="280" height="260" viewBox="-60 -50 360 320">
      <polygon points="30,20 220,10 250,210 10,230" fill="none" stroke="#534AB7" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="30" cy="20" r="5" fill="#AFA9EC"/>
      <circle cx="220" cy="10" r="5" fill="#AFA9EC"/>
      <circle cx="250" cy="210" r="5" fill="#AFA9EC"/>
      <circle cx="10" cy="230" r="5" fill="#AFA9EC"/>

      <g class="side-btn" onclick="selectSide('top')">
        <polygon class="side-hit" points="10,-15 240,-15 240,35 10,35"/>
        <text class="side-label" x="125" y="-8" text-anchor="middle">上边</text>
        <text class="side-value" id="val-top" x="125" y="6" text-anchor="middle">—</text>
      </g>
      <g class="side-btn" onclick="selectSide('right')">
        <polygon class="side-hit" points="205,-10 295,-10 295,230 205,230"/>
        <text class="side-label" x="280" y="110" text-anchor="middle">右边</text>
        <text class="side-value" id="val-right" x="280" y="124" text-anchor="middle">—</text>
      </g>
      <g class="side-btn" onclick="selectSide('bottom')">
        <polygon class="side-hit" points="-10,195 275,195 275,255 -10,255"/>
        <text class="side-label" x="130" y="265" text-anchor="middle">下边</text>
        <text class="side-value" id="val-bottom" x="130" y="278" text-anchor="middle">—</text>
      </g>
      <g class="side-btn" onclick="selectSide('left')">
        <polygon class="side-hit" points="-55,-5 25,-5 25,245 -55,245"/>
        <text class="side-label" x="-38" y="115" text-anchor="middle">左边</text>
        <text class="side-value" id="val-left" x="-38" y="129" text-anchor="middle">—</text>
      </g>

      <line id="active-line-top"    x1="30"  y1="20"  x2="220" y2="10"  stroke="#7F77DD" stroke-width="4" opacity="0" stroke-linecap="round"/>
      <line id="active-line-right"  x1="220" y1="10"  x2="250" y2="210" stroke="#7F77DD" stroke-width="4" opacity="0" stroke-linecap="round"/>
      <line id="active-line-bottom" x1="10"  y1="230" x2="250" y2="210" stroke="#7F77DD" stroke-width="4" opacity="0" stroke-linecap="round"/>
      <line id="active-line-left"   x1="30"  y1="20"  x2="10"  y2="230" stroke="#7F77DD" stroke-width="4" opacity="0" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="panel">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;">
      <span class="panel-title" id="panel-title">点击四边形的任意一边开始</span>
      <span class="tag" id="active-tag" style="display:none"></span>
    </div>
    <p class="panel-empty" id="hint-text">请先选择一条边</p>
    <div id="scan-section" style="display:none">
      <div class="cam-area" id="cam-area" style="display:none">
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-overlay">
          <div style="position:relative;width:60%;aspect-ratio:1">
            <div class="scan-frame"><div class="scan-line"></div></div>
          </div>
        </div>
      </div>
      <p class="status" id="scan-status"></p>
      <div class="btn-row">
        <button class="primary" id="scan-btn" onclick="startScan()">扫描二维码</button>
        <button id="manual-btn" onclick="toggleManual()">手动输入</button>
        <button class="danger" onclick="clearSide()" style="margin-left:auto">清除此边</button>
      </div>
      <div class="input-row" id="manual-row" style="display:none">
        <input type="text" id="manual-input" placeholder="输入二维码内容..."/>
        <button class="primary" onclick="saveManual()">保存</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">已记录数据</div>
    <div class="record-list" id="record-list">
      <p class="panel-empty">暂无记录</p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const SIDES = {top:'上边', right:'右边', bottom:'下边', left:'左边'};
let data = {top:null, right:null, bottom:null, left:null};
let activeSide = null;
let stream = null;
let scanInterval = null;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');

function selectSide(side) {
  activeSide = side;
  ['top','right','bottom','left'].forEach(s => {
    document.getElementById('active-line-'+s).setAttribute('opacity','0');
  });
  document.getElementById('active-line-'+side).setAttribute('opacity','1');
  document.getElementById('panel-title').textContent = SIDES[side] + ' — 操作';
  let tag = document.getElementById('active-tag');
  tag.textContent = SIDES[side]; tag.style.display='';
  document.getElementById('hint-text').style.display='none';
  document.getElementById('scan-section').style.display='';
  document.getElementById('scan-status').textContent = data[side] ? '当前值：' + data[side] : '尚未扫描';
  stopScan();
  document.getElementById('manual-row').style.display='none';
}

function startScan() {
  if (!activeSide) return;
  document.getElementById('cam-area').style.display='';
  document.getElementById('scan-status').textContent = '正在启动摄像头…';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(s => {
      stream = s;
      let v = document.getElementById('video');
      v.srcObject = s; v.play();
      document.getElementById('scan-btn').textContent = '停止扫描';
      document.getElementById('scan-btn').onclick = stopScan;
      document.getElementById('scan-status').textContent = '将二维码对准框内…';
      scanInterval = setInterval(doScan, 200);
    })
    .catch(e => {
      document.getElementById('scan-status').textContent = '无法访问摄像头：' + e.message;
      document.getElementById('cam-area').style.display='none';
    });
}

function doScan() {
  let v = document.getElementById('video');
  if (!v.videoWidth) return;
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  ctx.drawImage(v,0,0);
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let result = jsQR(img.data, img.width, img.height, {inversionAttempts:'dontInvert'});
  if (result && result.data) { saveValue(result.data); stopScan(); }
}

function stopScan() {
  clearInterval(scanInterval); scanInterval = null;
  if (stream) { stream.getTracks().forEach(t=>t.stop()); stream=null; }
  document.getElementById('cam-area').style.display='none';
  document.getElementById('scan-btn').textContent='扫描二维码';
  document.getElementById('scan-btn').onclick=startScan;
}

function toggleManual() {
  let row = document.getElementById('manual-row');
  row.style.display = row.style.display==='none'?'':'none';
  if (row.style.display!=='none') document.getElementById('manual-input').focus();
}

function saveManual() {
  let v = document.getElementById('manual-input').value.trim();
  if (!v||!activeSide) return;
  saveValue(v);
  document.getElementById('manual-input').value='';
  document.getElementById('manual-row').style.display='none';
}

function saveValue(val) {
  data[activeSide] = val;
  let short = val.length>14 ? val.slice(0,12)+'…' : val;
  document.getElementById('val-'+activeSide).textContent = short;
  document.getElementById('scan-status').textContent = '已保存：' + val;
  renderRecords();
}

function clearSide() {
  if (!activeSide) return;
  data[activeSide]=null;
  document.getElementById('val-'+activeSide).textContent='—';
  document.getElementById('scan-status').textContent='已清除';
  renderRecords();
}

function renderRecords() {
  let list = document.getElementById('record-list');
  let entries = Object.entries(data).filter(([,v])=>v);
  if (!entries.length) { list.innerHTML='<p class="panel-empty">暂无记录</p>'; return; }
  list.innerHTML = entries.map(([s,v])=>`
    <div class="record-item">
      <span class="record-side">${SIDES[s]}</span>
      <span class="record-val">${v}</span>
      <button class="record-del" onclick="deleteRecord('${s}')">删除</button>
    </div>`).join('');
}

function deleteRecord(side) {
  data[side]=null;
  document.getElementById('val-'+side).textContent='—';
  if (activeSide===side) document.getElementById('scan-status').textContent='已清除';
  renderRecords();
}
</script>
</body>
</html>
